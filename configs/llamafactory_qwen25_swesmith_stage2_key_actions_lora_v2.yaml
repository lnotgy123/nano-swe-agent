### model
model_name_or_path: /path/to/Qwen2.5-Coder-7B-Instruct
adapter_name_or_path: saves/qwen25-coder-7b/lora/swesmith-official-xml-16k-r128
trust_remote_code: true
enable_liger_kernel: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 128
lora_alpha: 256
lora_dropout: 0.05
lora_target: all
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset_dir: data/llamafactory
dataset: swesmith_stage2_key_actions_16k
template: qwen
cutoff_len: 16384
mask_history: true
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 2

### output
output_dir: saves/qwen25-coder-7b/lora/swesmith-stage2-key-actions-v2
logging_steps: 1
save_strategy: steps
save_steps: 0.25
save_total_limit: 4
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
gradient_checkpointing: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
# Stage 2 is evaluated through patch generation on the fixed SWE-bench slice.
