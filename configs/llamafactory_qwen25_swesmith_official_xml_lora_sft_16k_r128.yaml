### model
model_name_or_path: /path/to/Qwen2.5-Coder-7B-Instruct
trust_remote_code: true
enable_liger_kernel: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 128
lora_alpha: 256
lora_dropout: 0.05
lora_target: all
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset_dir: data/llamafactory
dataset: swesmith_official_xml_resolved_16k
template: qwen
cutoff_len: 16384
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 2

### output
output_dir: saves/qwen25-coder-7b/lora/swesmith-official-xml-16k-r128
logging_steps: 1
save_steps: 100
save_total_limit: 2
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
gradient_checkpointing: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
# Keep this as a pure SFT run first. We will evaluate generated patches after checkpoints.
